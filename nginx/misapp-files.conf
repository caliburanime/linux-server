# Nginx Configuration for MIS File Server
# 
# Purpose:
#   1. Serve static uploaded files (PDFs, images) from /var/www/misapp/uploads/
#   2. Reverse proxy file upload requests to Node.js server on port 3001
#   3. Handle CORS headers
#   4. Provide SSL/TLS encryption
#
# Location: /etc/nginx/sites-available/misapp-files.conf
# Enable with: sudo ln -s /etc/nginx/sites-available/misapp-files.conf /etc/nginx/sites-enabled/

# Redirect HTTP (6902) to HTTPS
server {
  listen 6902;
  listen [::]:6902;
  server_name files.your-domain.com your-server-ip;

  # For Let's Encrypt certificate validation
  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  # Redirect all other HTTP traffic to HTTPS
  location / {
    return 301 https://$server_name$request_uri;
  }
}

# Main HTTPS server block (Port 443)
# For production with SSL certificates
# Temporary: Use port 6903 if 443 is in use (see commented section at bottom)

# Main HTTPS server block
server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name files.your-domain.com;

  # SSL certificates (Let's Encrypt)
  # Uncomment after running: sudo certbot certonly --nginx -d files.your-domain.com
  # ssl_certificate /etc/letsencrypt/live/files.your-domain.com/fullchain.pem;
  # ssl_certificate_key /etc/letsencrypt/live/files.your-domain.com/privkey.pem;

  # SSL configuration
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers HIGH:!aNULL:!MD5;
  ssl_prefer_server_ciphers on;
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 10m;

  # Logs
  access_log /var/log/nginx/misapp-access.log combined;
  error_log /var/log/nginx/misapp-error.log warn;

  # Root for certbot
  root /var/www/misapp;

  # File upload API — reverse proxy to Node.js
  location /api/upload {
    # Allow larger request bodies for file uploads (increased to 100MB)
    client_max_body_size 100M;

    proxy_pass http://localhost:3001;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_cache_bypass $http_upgrade;

    # CORS headers for uploads
    add_header 'Access-Control-Allow-Origin' '$http_origin' always;
    add_header 'Access-Control-Allow-Credentials' 'true' always;
    add_header 'Access-Control-Allow-Methods' 'POST, OPTIONS' always;
    add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization' always;

    # Handle preflight OPTIONS request
    if ($request_method = 'OPTIONS') {
      return 204;
    }
  }

  # Other API endpoints (listing, deletion) — reverse proxy to Node.js
  location /api/ {
    proxy_pass http://localhost:3001;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_cache_bypass $http_upgrade;
  }

  # Health check endpoint
  location /health {
    proxy_pass http://localhost:3001;
    access_log off;
  }

  # Serve uploaded files statically
  location /uploads/ {
    alias /var/www/misapp/uploads/;
    
    # Don't log file access (reduce log noise)
    access_log off;

    # Allow caching of files
    expires 30d;
    add_header Cache-Control "public, immutable";

    # CORS headers
    add_header 'Access-Control-Allow-Origin' '*' always;
    add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;

    # Serve file or return 404
    try_files $uri =404;
  }

  # Index page (optional, for browsing)
  location = / {
    return 200 'MIS File Server is running. Use /api/upload to upload files.\n';
    add_header Content-Type text/plain;
  }

  # Deny access to sensitive files
  location ~ /\. {
    deny all;
    access_log off;
    log_not_found off;
  }

  location ~ ~$ {
    deny all;
    access_log off;
    log_not_found off;
  }

  # Rate limiting for uploads (optional)
  # limit_req_zone $binary_remote_addr zone=upload_limit:10m rate=10r/s;
  # location /api/upload {
  #   limit_req zone=upload_limit burst=20 nodelay;
  #   ...
  # }
}

# For local testing without SSL:
# Use port 6902 for HTTP, or 6903 for HTTPS testing
# Uncomment this block to test on custom ports without certificates

server {
  listen 6903;
  server_name localhost 100.71.77.89;

  access_log /var/log/nginx/misapp-local.log combined;
  error_log /var/log/nginx/misapp-error.log warn;

  root /var/www/misapp;

  location /api/upload {
    client_max_body_size 100M;
    proxy_pass http://localhost:3001;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    add_header 'Access-Control-Allow-Origin' '*' always;
    add_header 'Access-Control-Allow-Methods' 'POST, OPTIONS' always;
    add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization' always;
    if ($request_method = 'OPTIONS') {
      return 204;
    }
  }

  location /api/ {
    proxy_pass http://localhost:3001;
    proxy_set_header Host $host;
  }

  location /uploads/ {
    alias /var/www/misapp/uploads/;
    try_files $uri =404;
  }

  location = / {
    return 200 'MIS File Server (local test on port 6903)\n';
    add_header Content-Type text/plain;
  }
}
