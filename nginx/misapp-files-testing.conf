# Nginx Configuration for MIS File Server — TESTING VERSION (Port 6902)
# 
# Simple HTTP-only configuration for testing
# No SSL certificate required
# 
# Location: /etc/nginx/sites-available/misapp-files.conf

server {
  listen 6902;
  listen [::]:6902;
  server_name _;

  access_log /var/log/nginx/misapp-access.log combined;
  error_log /var/log/nginx/misapp-error.log warn;

  # Root directory
  root /var/www/misapp;

  # Health check endpoint
  location /health {
    proxy_pass http://localhost:3001;
    access_log off;
  }

  # File upload API — reverse proxy to Node.js
  location /api/upload {
    client_max_body_size 10M;

    proxy_pass http://localhost:3001;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto http;

    # CORS headers
    add_header 'Access-Control-Allow-Origin' '*' always;
    add_header 'Access-Control-Allow-Methods' 'POST, OPTIONS' always;
    add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization' always;

    if ($request_method = 'OPTIONS') {
      return 204;
    }
  }

  # Other API endpoints
  location /api/ {
    proxy_pass http://localhost:3001;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  # Serve uploaded files statically
  location /uploads/ {
    alias /var/www/misapp/uploads/;
    
    access_log off;
    expires 30d;
    add_header Cache-Control "public, immutable";
    add_header 'Access-Control-Allow-Origin' '*' always;

    try_files $uri =404;
  }

  # Root endpoint
  location = / {
    return 200 'MIS File Server is running on port 6902\nEndpoints:\n  POST /api/upload - Upload file\n  GET /uploads/* - Download file\n  GET /health - Health check\n';
    add_header Content-Type text/plain;
  }

  # Deny access to hidden files
  location ~ /\. {
    deny all;
    access_log off;
    log_not_found off;
  }
}
